<form [formGroup]="formReport">
  <div class="card shadow mb-4 icon-box ">
    <div class="card-body">
      <div class="row text-center">
        <h3 style="color: var(--bg-2665C);"><b>{{ title() }}</b></h3>
      </div>
      <p-accordion [activeIndex]="1">
        <p-accordionTab header="Filtros">
          <div class="p-fluid">

            <!-- ===================== -->
            <!-- FILA 1 : 4 COLUMNAS -->
            <!-- ===================== -->
            <div class="row">

              <!-- Tipo Filtrado -->
              <div class="col-12 col-md-3">
                <label class="block mb-1">Tipo Filtrado<span class="text-danger">*</span></label>
                <p-dropdown #dropdownFilterBy [options]="types_filtrado()" formControlName="filterBy" optionLabel="name"
                  optionValue="code" appendTo="body" (onChange)="onChangeTypesFilter()">
                </p-dropdown>
              </div>

              <!-- Fecha -->
              <div class="col-12 col-md-3">
                <label class="block mb-1">Fecha<span class="text-danger">*</span></label>

                <p-calendar #calendarDates *ngIf="formReport.get('filterBy')?.value == 'MONTH'" formControlName="dates"
                  view="month" dateFormat="mm/yy" placeholder="MM/YYYY" [showIcon]="true">
                </p-calendar>

                <p-calendar #calendarDates *ngIf="formReport.get('filterBy')?.value == 'RANGE'" formControlName="dates"
                  selectionMode="range" dateFormat="dd/mm/yy" placeholder="DD/MM/YYYY" [showIcon]="true">
                </p-calendar>

                <p-calendar #calendarDates *ngIf="formReport.get('filterBy')?.value == 'YEAR'" formControlName="dates"
                  view="year" dateFormat="yy" placeholder="YYYY" [showIcon]="true">
                </p-calendar>

                <p-calendar #calendarDates *ngIf="formReport.get('filterBy')?.value == 'DAY'" formControlName="dates"
                  dateFormat="dd/mm/yy" placeholder="DD/MM/YYYY" [showIcon]="true">
                </p-calendar>

                <small *ngIf="validatorsService.inputValid('dates',formReport)" class="p-error block">
                  {{ validatorsService.inputValidMessage("dates",formReport) }}
                </small>
              </div>

              <!-- Área / Almacén -->
              <div class="col-12 col-md-3">
                <label class="block mb-1">Área / Almacén</label>
                <p-dropdown #dropdownStorage [options]="validatorsService.storages()"
                  placeholder="Selecciona un almacén" optionLabel="name" optionValue="id" [filter]="true"
                  [showClear]="true" appendTo="body" formControlName="id_storage">
                </p-dropdown>
              </div>

              <!-- Filtrar Saldos -->
              <div class="col-12 col-md-3">
                <label class="block mb-1">Filtrar Saldos</label>

                <div class="d-flex align-items-center gap-3 mt-2">
                  <p-inputSwitch #inputSwitchSaldo formControlName="showZeroSaldo">
                  </p-inputSwitch>

                  <p-tag *ngIf="formReport.get('showZeroSaldo')?.value" severity="info" icon="fas fa-check-circle"
                    value="Incluir saldos en cero">
                  </p-tag>

                  <p-tag *ngIf="!formReport.get('showZeroSaldo')?.value" severity="success" icon="fas fa-filter"
                    value="Excluir saldos en cero">
                  </p-tag>
                </div>
              </div>

            </div>

            <!-- ===================== -->
            <!-- FILA 2 : RESTO -->
            <!-- ===================== -->
            <div class="row mt-3">

              <!-- Categorías Multiselect -->
              <div class="col-12 col-sm-6">
                <label class="block mb-1">Categorías</label>
                <p-multiSelect [options]="dropdownCategories()" [(ngModel)]="selectedCategoryValues"
                  (onChange)="onCategoryChange($event.value)" optionLabel="name" optionValue="id"
                  placeholder="Seleccione categorías..." [style]="{'width':'100%'}" appendTo="body" [filter]="true"
                  filterBy="name" [loading]="loadingCategories()" [showClear]="true" display="chip">
                </p-multiSelect>
              </div>

              <div class="col-12 col-sm-6">
                <div class="row mt-1">
                  <div class="col-12 col-sm-6">
                    <label class="block mb-1">Producto</label>
                    <p-dropdown [options]="dropdownProducts()" [(ngModel)]="productSelectValue"
                      (onChange)="onProductSelect($event.value)" [filter]="true" filterBy="name,cod" [showClear]="true"
                      (onFilter)="filterProduct($event)" [loading]="loadingSearchProduct()"

                      placeholder="Busque un producto aquí..."
                      [style]="{'width':'100%'}" appendTo="body" optionLabel="name" optionValue="id"
                      [scrollHeight]="'450px'" [panelStyle]="{'max-height': '500px', 'min-width': '450px'}">

                      <ng-template pTemplate="selectedItem" let-product>
                        <div *ngIf="product" class="flex align-items-center gap-2">
                          <span class="text-muted" style="font-size: 0.85em;">{{ product.cod }}</span>
                          <span class="mx-1">|</span>
                          <span class="fw-bold">{{ product.name }}</span>
                        </div>
                        <div *ngIf="!product">
                          <span class="text-muted">Seleccione un producto...</span>
                        </div>
                      </ng-template>

                      <ng-template let-product pTemplate="item">
                        <div class="flex align-items-center gap-2" style="padding: 4px 0;">
                          <div>
                            <span class="fw-bold" style="font-size: 0.9em;">{{ product.cod }}</span>
                            <br>
                            <span class="text-muted fw-normal" style="font-size: 0.85em;">{{ product.name }}</span>
                          </div>
                        </div>
                      </ng-template>

                      <ng-template pTemplate="empty">
                        <div class="p-3">
                          <div *ngIf="loadingSearchProduct()" class="text-center">
                            <i class="pi pi-spinner pi-spin mr-2"></i>
                            <span>Cargando...</span>
                          </div>
                          <div *ngIf="!loadingSearchProduct() && dropdownFilter()" class="text-center">
                            <span>No se encontró el producto: "{{dropdownFilter() | uppercase}}"</span>
                          </div>
                        </div>
                      </ng-template>

                    </p-dropdown>
                  </div>

                  <div class="col-12 col-sm-6 mt-2">
                    <b>Producto Seleccionado:
                      <br>
                      <p-tag [rounded]="true" icon="fa-solid fa-tag" [severity]="productSelect() ? 'info' : 'warning'"
                        [value]="productSelect() ? 'COD: ' + productSelect()?.cod+' / ' + productSelect()?.name : 'COD: 0 / SELECCIONE UN PRODUCTO'">
                        <p-badge *ngIf="productSelect()" class="cursor-pointer" severity="danger"
                          (click)="clearSelectProduct()" [value]="'X'" styleClass="mr-2" pTooltip="Quitar Producto"
                          tooltipPosition="top">
                        </p-badge>
                        &nbsp;
                      </p-tag>
                    </b>
                  </div>
                </div>
              </div>
            </div>



          </div>

          <div class="text-end">
            <p-button (click)="!loading() ? getAllAndSearchKardex(1,this.rows()) : null"
              styleClass="p-button-rounded p-button-sm" label="Buscar" icon="fa-solid fa-magnifying-glass"
              [loading]="loading()">
            </p-button>

            <p-splitButton *ngIf="validatorsService.withPermission('KARDEX','reports')" icon="fas fa-print"
              label="Imprimir" [model]="this.buttonItems" [menuStyle]="{'width':'8em'}" [size]="'small'"
              [rounded]="true" [severity]="'danger'" (onClick)="!loading() ? this.printPdfReport() : null"
              styleClass="ms-1">
            </p-splitButton>

            <p-button (click)="clearInputs()"
              styleClass="p-button-rounded ms-1 mt-2 mt-sm-0 mt-md-0 p-button-success p-button-sm" icon="fas fa-broom"
              label="Limpiar" [pTooltip]="'Limpiar Campos'" [loading]="loading()">
            </p-button>
          </div>
        </p-accordionTab>
      </p-accordion>
    </div>
    <p-tabMenu [model]="searchItems()" [styleClass]="loading() ? 'p-disabled' : ''"
      [activeItem]="searchItems()[0]"></p-tabMenu>
  </div>
</form>
<app-table [cols]="cols()" (customSort$)="customSort($event)" [sortOrder]="'ASC'" [sortField]="'product.cod'"
  [includeSearch]="false" (rows$)="paginate($event)" (search$)="search($event)" [data]="kardexes()"
  [groupRowsBy]="'product.category.name'" [loading]="loading()">
  <tr>
    <th colspan="4"></th>
    <th style="background-color: var(--bg-primary)" colspan="3" class="text-white text-center">FÍSICO</th>
  </tr>
</app-table>
